<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نظام فلج - إدارة جداول السقي</title>
    <meta name="description" content="نظام إلكتروني متكامل لإدارة جداول السقي في الأفلاج التقليدية">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="فلج">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary:#0ea5e9; --primary-dark:#0284c7; --primary-glow:rgba(14,165,233,0.25);
            --teal:#14b8a6; --gold:#f59e0b; --bg:#0f172a; --bg-2:#1e293b; --bg-3:#334155;
            --surface:rgba(30,41,59,0.85); --surface-2:rgba(51,65,85,0.6);
            --border:rgba(148,163,184,0.15); --border-light:rgba(148,163,184,0.08);
            --text:#f1f5f9; --text-muted:#94a3b8; --text-dim:#64748b;
            --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; --whatsapp:#25D366;
            --r:16px; --rl:24px; --rxl:32px;
        }
        html { scroll-behavior: smooth; }
        body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; padding-bottom:80px; }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:var(--bg-2); }
        ::-webkit-scrollbar-thumb { background:var(--bg-3); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--primary); }
        .app-bg { min-height:100vh; background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(14,165,233,0.15) 0%,transparent 60%),var(--bg); }

        /* Header */
        .header { position:sticky; top:0; z-index:100; background:rgba(15,23,42,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
        .header-inner { max-width:1280px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:68px; padding:0 20px; gap:12px; }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0; }
        .logo-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--primary),var(--teal)); border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px var(--primary-glow); }
        .logo-text { font-size:20px; font-weight:800; color:var(--text); }
        .logo-sub { font-size:10px; color:var(--text-muted); }
        .nav { display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; flex:1; justify-content:flex-end; }
        .nav::-webkit-scrollbar { display:none; }
        .nav-btn { display:flex; align-items:center; gap:6px; padding:7px 12px; border-radius:9px; border:none; background:transparent; color:var(--text-muted); font-family:'Cairo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
        .nav-btn:hover { background:var(--surface-2); color:var(--text); }
        .nav-btn.active { background:var(--primary-glow); color:var(--primary); }
        .nav-btn svg { width:15px; height:15px; flex-shrink:0; }

        /* PWA install banner */
        .install-banner { background:linear-gradient(90deg,#0284c7,#0f766e); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
        .install-banner p { font-size:13px; font-weight:700; }
        .install-banner button { background:white; color:#0f172a; border:none; padding:7px 16px; border-radius:8px; font-family:'Cairo',sans-serif; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; }

        /* Main */
        .main { max-width:1280px; margin:0 auto; padding:24px 20px 60px; }

        /* Clock */
        .big-clock { text-align:center; margin-bottom:24px; padding:20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--rxl); box-shadow:0 8px 32px rgba(0,0,0,0.2); position:relative; overflow:hidden; }
        .big-clock::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(14,165,233,0.1) 0%,transparent 100%); }
        .clock-time { font-family:'JetBrains Mono',monospace; font-size:clamp(40px,8vw,76px); font-weight:700; color:#e0f2fe; text-shadow:0 0 20px var(--primary-glow); line-height:1; direction:ltr; position:relative; }
        .clock-ampm { font-size:0.35em; color:var(--text-dim); vertical-align:middle; margin-right:8px; }
        .clock-date { font-size:clamp(13px,2vw,16px); color:var(--text-muted); font-weight:600; margin-top:8px; position:relative; }

        /* Cards */
        .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
        @media(max-width:700px) { .status-grid { grid-template-columns:1fr; } }
        .card { background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; }
        .card-glow { box-shadow:0 0 0 1px var(--border),0 8px 32px rgba(0,0,0,0.3); }
        .current-card { position:relative; overflow:hidden; border-radius:var(--rxl); padding:clamp(18px,4vw,28px); color:white; transition:all 0.5s; }
        .current-card.active { background:linear-gradient(135deg,#0284c7,#0f766e); box-shadow:0 16px 48px rgba(2,132,199,0.3); }
        .current-card.ending { background:linear-gradient(135deg,#dc2626,#c2410c); box-shadow:0 16px 48px rgba(220,38,38,0.35); }
        .current-card.idle { background:linear-gradient(135deg,#334155,#1e293b); }
        .wm { position:absolute; top:-20px; left:-20px; opacity:0.06; pointer-events:none; }
        .next-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--rxl); padding:clamp(18px,4vw,28px); position:relative; overflow:hidden; }
        .next-bar { position:absolute; top:0; right:0; width:4px; height:100%; background:linear-gradient(to bottom,var(--primary),var(--teal)); }

        /* Badges */
        .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
        .b-glass { background:rgba(255,255,255,0.15); backdrop-filter:blur(8px); }
        .b-danger { background:rgba(220,38,38,0.3); color:#fca5a5; }
        .b-primary { background:var(--primary-glow); color:var(--primary); border:1px solid rgba(14,165,233,0.3); }
        .b-success { background:rgba(34,197,94,0.15); color:#86efac; border:1px solid rgba(34,197,94,0.3); }
        .b-gold { background:rgba(245,158,11,0.15); color:#fde68a; border:1px solid rgba(245,158,11,0.3); }
        .b-indigo { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.3); }
        .b-teal { background:rgba(20,184,166,0.15); color:#5eead4; border:1px solid rgba(20,184,166,0.3); }
        .b-surface { background:var(--surface-2); color:var(--text); border:1px solid var(--border-light); }
        .b-day { background:rgba(245,158,11,0.15); color:#fde68a; border:1px solid rgba(245,158,11,0.25); }
        .b-night { background:rgba(99,102,241,0.15); color:#a5b4fc; border:1px solid rgba(99,102,241,0.25); }

        .pdot { width:7px; height:7px; border-radius:50%; background:currentColor; animation:pdot 2s infinite; }
        @keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
        .blink { animation:blink 1.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
        .animate-in { animation:fadeIn .35s ease forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

        .cname { font-size:clamp(22px,5vw,48px); font-weight:900; margin:16px 0 6px; line-height:1.1; }
        .ichip { background:rgba(0,0,0,0.2); border-radius:10px; padding:10px 14px; }
        .countdown { font-family:'JetBrains Mono',monospace; font-size:clamp(18px,4vw,26px); font-weight:700; direction:ltr; }
        .secs { color:rgba(255,255,255,0.5); }
        .info-row { display:flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border-light); border-radius:9px; padding:9px 12px; font-size:13px; color:var(--text-muted); }
        .info-row svg { color:var(--primary); flex-shrink:0; }

        /* Table */
        .tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
        table { width:100%; border-collapse:collapse; min-width:680px; text-align:right; }
        thead tr { background:var(--surface-2); border-bottom:1px solid var(--border); }
        th { padding:12px 14px; font-size:11px; font-weight:700; color:var(--text-dim); white-space:nowrap; text-transform:uppercase; }
        td { padding:12px 14px; font-size:13px; color:var(--text-muted); vertical-align:middle; white-space:nowrap; }
        tbody tr { border-bottom:1px solid var(--border-light); transition:background .15s; }
        tbody tr:hover { background:rgba(255,255,255,0.03); }
        tbody tr.r-active { background:rgba(34,197,94,0.15); box-shadow: inset -4px 0 0 var(--success); }
        tbody tr.r-next { background:rgba(14,165,233,0.1); box-shadow: inset -4px 0 0 var(--primary); }
        .pname { font-weight:700; font-size:14px; color:var(--text); }
        .rlabel { font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; margin-right:4px; }

        /* Search */
        .search-wrap { position:relative; max-width:480px; margin:0 auto 28px; }
        .search-ic { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-dim); pointer-events:none; }
        .search-inp { width:100%; background:var(--surface-2); border:2px solid var(--border); border-radius:var(--r); padding:13px 46px 13px 14px; font-family:'Cairo',sans-serif; font-size:15px; color:var(--text); outline:none; transition:all .2s; }
        .search-inp:focus { border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-glow); }
        .sitem { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:10px; transition:all .2s; }
        .sitem.sc { border-color:var(--primary); box-shadow:0 0 0 1px var(--primary),0 6px 20px var(--primary-glow); }

        /* Forms */
        .fg { display:flex; flex-direction:column; gap:5px; }
        .fl { font-size:12px; font-weight:700; color:var(--text-muted); }
        .fi, .fsel { background:var(--bg-2); border:1.5px solid var(--border); border-radius:9px; padding:9px 12px; font-family:'Cairo',sans-serif; font-size:13px; color:var(--text); outline:none; width:100%; }
        .fi:focus,.fsel:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-glow); }
        .fgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
        .ftabs { display:flex; gap:4px; margin-bottom:20px; background:var(--surface-2); border-radius:10px; padding:4px; }
        .ftab { flex:1; padding:8px; border:none; border-radius:7px; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; cursor:pointer; background:transparent; color:var(--text-muted); transition:all .2s; }
        .ftab.active { background:var(--primary); color:white; }

        /* Buttons */
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:9px 18px; border-radius:9px; border:none; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; white-space:nowrap; }
        .bp { background:var(--primary); color:white; box-shadow:0 4px 16px var(--primary-glow); }
        .bp:hover { background:var(--primary-dark); transform:translateY(-1px); }
        .bs { background:var(--success); color:white; }
        .bs:hover { background:#16a34a; transform:translateY(-1px); }
        .bg { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
        .bg:hover { background:var(--surface-2); color:var(--text); }
        .bd { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.25); }
        .bsm { padding:5px 10px; font-size:12px; }
        .bic { padding:7px; }
        .bfull { width:100%; }

        /* Sections */
        .sttl { display:flex; align-items:center; gap:8px; font-size:17px; font-weight:800; color:var(--text); margin-bottom:16px; }
        .sttl svg { color:var(--primary); }
        .sec-card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:16px; }
        .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
        .empty { text-align:center; padding:40px 20px; color:var(--text-dim); }
        .empty svg { width:44px; height:44px; opacity:.25; margin:0 auto 10px; display:block; }

        /* Auth */
        .auth-card { max-width:400px; margin:50px auto 0; background:var(--surface); border:1px solid var(--border); border-radius:var(--rxl); padding:clamp(24px,5vw,44px); text-align:center; }

        /* Tools */
        .prayer-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin-top:14px; }
        .prayer-item { background:var(--bg-2); border:1px solid var(--border-light); border-radius:10px; padding:10px; text-align:center; }
        .prayer-name { font-size:12px; color:var(--text-muted); font-weight:700; margin-bottom:3px; }
        .prayer-time { font-family:'JetBrains Mono',monospace; font-size:16px; color:var(--text); font-weight:700; direction:ltr; }

        /* Stats */
        .stats-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
        .stat-chip { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; display:flex; align-items:center; gap:8px; }
        .stat-n { font-size:20px; font-weight:800; color:var(--text); }
        .stat-l { font-size:11px; color:var(--text-dim); }

        /* WhatsApp FAB */
        .wa-fab { position:fixed; bottom:20px; right:20px; width:56px; height:56px; background:var(--whatsapp); color:white; border-radius:50%; display:flex; justify-content:center; align-items:center; box-shadow:0 4px 20px rgba(37,211,102,.4); z-index:999; text-decoration:none; transition:all .3s; }
        .wa-fab:hover { transform:scale(1.1) rotate(-5deg); }
        .wa-fab svg { width:28px; height:28px; fill:currentColor; }

        /* Conflict warning */
        .conflict-box { background:rgba(239,68,68,0.12); border:1.5px solid rgba(239,68,68,0.4); border-radius:10px; padding:12px 16px; font-size:13px; color:#fca5a5; margin-bottom:12px; display:flex; gap:8px; align-items:flex-start; }

        /* Recurring badges */
        .rec-badge { background:rgba(20,184,166,0.15); color:#5eead4; border:1px solid rgba(20,184,166,0.3); font-size:10px; font-weight:700; padding:2px 8px; border-radius:5px; }

        /* Notification toast */
        .toast { position:fixed; top:18px; left:50%; transform:translateX(-50%); padding:11px 22px; border-radius:10px; font-weight:700; font-size:13px; z-index:9999; box-shadow:0 8px 24px rgba(0,0,0,.3); animation:fadeIn .3s ease; white-space:nowrap; }

        @media (max-width:480px) {
            .nav { padding:14px; flex-direction:column; gap:10px; }
            .tab-buttons { flex-wrap:wrap; }
        }

        /* Print Styles */
        @media print {
            body { background: #fff; color: #000; }
            .nav, .tab-buttons, .chat-widget, button { display: none !important; }
            .card { box-shadow: none !important; border: 1px solid #000 !important; page-break-inside: avoid; background: #fff !important; }
            .card-glow::before { display: none !important; }
            table { border-collapse: collapse; width: 100%; color: #000; }
            th, td { border: 1px solid #000; padding: 8px; color: #000 !important; }
            .badge, .rlabel { border: 1px solid #000; color: #000 !important; background: transparent !important; box-shadow: none !important; }
            .big-clock { background: none; border: none; color: #000; box-shadow: none; }
            .time { color: #000 !important; text-shadow: none !important; }
            * { color: #000 !important; text-shadow: none !important; }
        }

        @media(max-width:480px) {
            .main { padding:16px 12px 60px; }
            .header-inner { padding:0 12px; }
            .nav-btn span { display:none; }
        }
        @media(max-width:360px) {
            .logo-sub { display:none; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ─── Icons ─── */
const I = {
    Drop:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>,

    Shield:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>,
    Bell:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,

    List:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
    Search:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
    Lock:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
    Logout:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    Edit:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    Plus:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    Check:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,

    Sun:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
    Next:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
    Coffee:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
    Wrench:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
    Send:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
    Repeat:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>,
    Calc:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/></svg>,
    Alert:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    Mobile:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>,
    WhatsApp:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,
};

const DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const ADMIN_PASS = "Asdf@#$1234";
const WA_NUM = "+96896017822";
const ATHAR_MINS = 30; // كل أثر = 30 دقيقة

const EF = { name:"", number:"", day:"", date:"", time:"", period:"نهار", raddahName:"", athar:"" };
const ER = { name:"", number:"", raddahName:"", athar:"", startDate:"", recType:"days", recValue:"10", occurrences:"8", cycle:[{time:"", period:"نهار"}] };

const fmt = n => String(n).padStart(2,'0');
const fmtDate = s => { try { const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; } catch(e){return s;} };
const fmtTime12 = t => {
    if(!t) return '';
    const [h,m] = t.split(':').map(Number);
    const ap = h>=12?'م':'ص'; const h12 = h%12||12;
    return `${fmt(h12)}:${fmt(m)} ${ap}`;
};
const toMs = (date, time) => { try { const [y,mo,d]=date.split('-').map(Number); const [h,mn]=time.split(':').map(Number); return new Date(y,mo-1,d,h,mn,0).getTime(); } catch(e){return 0;} };
const atharMs = v => (parseFloat(v)||0) * ATHAR_MINS * 60 * 1000;

function App() {
    const [view, setView] = useState('public');
    const [records, setRecords] = useState(() => {
        for (const k of ['falaj-v5','falaj-v4','falaj-v3','falaj-records-v2']) {
            try { const s=localStorage.getItem(k); if(s) return JSON.parse(s).map(r=>({...r,athar:r.athar||""})); } catch(e){}
        }
        return [];
    });
    const [patterns, setPatterns] = useState(() => { try{return JSON.parse(localStorage.getItem("falaj-patterns")||"[]");}catch(e){return [];} });
    const [subs, setSubs] = useState(() => { try{return JSON.parse(localStorage.getItem("falaj-subs")||"[]");}catch(e){return [];} });
    const [form, setForm] = useState(EF);
    const [recurForm, setRecurForm] = useState(ER);
    const [now, setNow] = useState(new Date());
    const [searchQ, setSearchQ] = useState("");
    const [editId, setEditId] = useState(null);
    const [adminPass, setAdminPass] = useState("");
    const [isAdmin, setIsAdmin] = useState(false);
    const [toast, setToast] = useState(null);
    const [delConfirm, setDelConfirm] = useState(null);
    const [adminTab, setAdminTab] = useState('manual'); // 'manual' | 'recur' | 'manage'
    const [swapForm, setSwapForm] = useState({me:"",other:"",reason:""});
    const [calcAthar, setCalcAthar] = useState("");
    const [deferredPrompt, setDeferredPrompt] = useState(null);
    const [showInstall, setShowInstall] = useState(false);
    const [conflictMsg, setConflictMsg] = useState("");
    const lastNotif = useRef({});

    useEffect(() => { const t=setInterval(()=>setNow(new Date()),1000); return()=>clearInterval(t); },[]);
    useEffect(() => { try{localStorage.setItem("falaj-v5",JSON.stringify(records));}catch(e){} }, [records]);
    useEffect(() => { try{localStorage.setItem("falaj-patterns",JSON.stringify(patterns));}catch(e){} }, [patterns]);
    useEffect(() => { try{localStorage.setItem("falaj-subs",JSON.stringify(subs));}catch(e){} }, [subs]);

    // PWA install prompt
    useEffect(() => {
        const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
    }, []);

    // SW registration
    useEffect(() => {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch((e)=>{});
        }
    }, []);

    const showToast = useCallback((msg, type='ok') => {
        setToast({msg,type}); setTimeout(()=>setToast(null),3000);
    },[]);

    const installApp = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') { setShowInstall(false); showToast("تم تثبيت التطبيق!"); }
        setDeferredPrompt(null);
    };

    /* ── Processed Records ── */
    const processed = useMemo(() => {
        if (!records.length) return [];
        const sorted = records.map(r => {
            const startMs = toMs(r.date, r.time);
            return {...r, startMs};
        }).sort((a,b)=>a.startMs-b.startMs);

        for (let i=0; i<sorted.length; i++) {
            const a = atharMs(sorted[i].athar);
            if (a > 0) {
                sorted[i].endMs = sorted[i].startMs + a;
            } else if (i < sorted.length-1) {
                sorted[i].endMs = sorted[i+1].startMs;
            } else {
                sorted[i].endMs = sorted[i].startMs + 24*3600*1000;
            }
        }
        return sorted;
    }, [records]);

    /* ── Live Status ── */
    const status = useMemo(() => {
        const ms = now.getTime();
        const current = processed.find(r=>ms>=r.startMs&&ms<r.endMs)||null;
        const upcoming = processed.filter(r=>r.startMs>ms);
        const next = upcoming[0]||null;
        let tr=null, ending=false, nextTr=null;
        if (current) {
            const d=current.endMs-ms;
            tr={h:Math.floor(d/3600000),m:Math.floor((d%3600000)/60000),s:Math.floor((d%60000)/1000)};
            ending = d < 15*60*1000;
        }
        if (!current&&next) {
            const d=next.startMs-ms;
            nextTr={h:Math.floor(d/3600000),m:Math.floor((d%3600000)/60000),s:Math.floor((d%60000)/1000)};
        }
        return {current,next,upcoming,tr,ending,nextTr};
    }, [now,processed]);

    /* ── Notifications ── */
    useEffect(() => {
        if (!("Notification" in window)||Notification.permission!=="granted") return;
        subs.forEach(sid=>{
            const r=processed.find(x=>x.id===sid); if(!r) return;
            const d=r.startMs-now.getTime();
            const m=Math.floor(d/60000);
            if(m===15&&!lastNotif.current[sid+'-15']) { lastNotif.current[sid+'-15']=true; playBeep(); new Notification("تنبيه الفلج",{body:`دورك (${r.raddahName}) سيبدأ بعد 15 دقيقة!`}); }
            if(m===0&&d>0&&d<2000&&!lastNotif.current[sid+'-0']) { lastNotif.current[sid+'-0']=true; playBeep(); new Notification("حان وقت السقي!",{body:`بدأ دورك (${r.raddahName}) الآن!`}); }
        });
    },[now,subs,processed]);

    /* ── Conflict check ── */
    const hasConflict = (date, time, athar, excludeId=null) => {
        const newStart = toMs(date,time);
        if(!newStart) return false;
        const a = atharMs(athar);
        const newEnd = a > 0 ? newStart+a : newStart+1;

        return processed.some(r => {
            if (excludeId && r.id===excludeId) return false;
            const rEnd = r.endMs;
            // overlap: newStart < rEnd AND newEnd > rStart
            return newStart < rEnd && newEnd > r.startMs;
        });
    };

    /* ── Form Save ── */
    const handleSave = () => {
        if (!form.name.trim()||!form.number||!form.date||!form.time||!form.day||!form.raddahName.trim()) {
            showToast("يرجى تعبئة جميع الحقول","err"); return;
        }
        if (hasConflict(form.date,form.time,form.athar,editId)) {
            setConflictMsg(`⚠️ تعارض في الوقت! يوجد سجل آخر يتداخل مع هذا الوقت (${fmtTime12(form.time)} في ${fmtDate(form.date)}). الرجاء اختيار وقت مختلف.`);
            return;
        }
        setConflictMsg("");
        if (editId) {
            setRecords(records.map(r=>r.id===editId?{...form,id:editId}:r));
            showToast("تم تحديث السجل");
        } else {
            setRecords(p=>[...p,{...form,id:Date.now()}]);
            showToast("تمت الإضافة بنجاح");
        }
        setForm(EF); setEditId(null);
    };

    /* ── Generate Recurring Records ── */
    const handleGenerate = () => {
        const {name,number,raddahName,athar,startDate,recType,recValue,cycle} = recurForm;
        if (!name.trim()||!number||!raddahName.trim()||!startDate||!cycle||cycle.length===0||cycle.some(c=>!c.time)) {
            showToast("يرجى تعبئة جميع حقول الجدولة وأوقات الدوران","err"); return;
        }
        const count = 100; // إنشاء مستمر لـ 100 تكرار في المستقبل
        const dates = [];
        let cur = new Date(startDate);
        // Generate dates
        for (let i=0; i<count; i++) {
            if (i===0) { dates.push(new Date(cur)); }
            else {
                if (recType==='days') {
                    cur = new Date(cur.getTime()+parseInt(recValue)*24*3600*1000);
                    dates.push(new Date(cur));
                } else if (recType==='weekday') {
                    cur = new Date(cur.getTime()+24*3600*1000);
                    while(cur.getDay()!==parseInt(recValue)) cur=new Date(cur.getTime()+24*3600*1000);
                    dates.push(new Date(cur));
                }
            }
        }
        let added=0, skipped=0;
        const newRecords=[];
        dates.forEach((dt, i) => {
            const dateStr = `${dt.getFullYear()}-${fmt(dt.getMonth()+1)}-${fmt(dt.getDate())}`;
            const dayStr = DAYS[dt.getDay()];
            const cycleItem = cycle[i % cycle.length];
            const {time, period} = cycleItem;
            if (hasConflict(dateStr,time,athar,null)) { skipped++; return; }
            newRecords.push({id:Date.now()+added,name,number,raddahName,athar,period,time,date:dateStr,day:dayStr});
            added++;
        });
        if (newRecords.length>0) setRecords(p=>[...p,...newRecords]);
        // Save pattern
        setPatterns(p=>[...p,{id:Date.now(),label:`${raddahName} - كل ${recType==='days'?recValue+' يوم':DAYS[parseInt(recValue)]}`,data:recurForm}]);
        showToast(`✅ أُضيف ${added} سجل${skipped>0?' | ⚠️ تجاوز '+skipped+' تعارض':''}`);
        setRecurForm(ER);
    };

    const handleEdit = r => {
        setForm({name:r.name,number:r.number,day:r.day,date:r.date,time:r.time,period:r.period,raddahName:r.raddahName,athar:r.athar||""});
        setEditId(r.id); setAdminTab('manual'); setConflictMsg("");
        window.scrollTo({top:0,behavior:'smooth'});
    };
    const handleDelete = id => { setRecords(p=>p.filter(r=>r.id!==id)); setDelConfirm(null); showToast("تم الحذف","err"); };
    const toggleSub = id => {
        if(subs.includes(id)){setSubs(p=>p.filter(x=>x!==id)); showToast("تم إلغاء التنبيه"); return;}
        if("Notification" in window) {
            Notification.requestPermission().then(p=>{
                if(p==="granted"){setSubs(pr=>[...pr,id]);showToast("تم تفعيل التنبيه");}
                else alert("فعّل الإشعارات من إعدادات المتصفح.");
            });
        }
    };
    const shareRaddah = r => {
        const atharStr = r.athar ? " (" + r.athar + " أثر)" : "";
        const txt = "تذكير دور سقي الفلج 💧\nالاسم: " + r.name + "\nالردة: " + r.raddahName + atharStr + "\nالتاريخ: " + r.day + "، " + fmtDate(r.date) + "\nالوقت: " + fmtTime12(r.time) + " (" + r.period + ")\n📍 توقيت ولاية منح، عُمان";
        window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");
    };

    /* ── Views ── */
    const renderPublic = () => {
        const todayStr = `${now.getFullYear()}-${fmt(now.getMonth()+1)}-${fmt(now.getDate())}`;
        const rows = processed.filter(r => r.date === todayStr || (status.current && r.id === status.current.id));
        return <div className="animate-in">
            {/* Clock */}
            <div className="big-clock">
                <div className="clock-time">
                    <span className="clock-ampm">{clockAP}</span>
                    {clockHM}
                    <span style={{fontSize:'0.35em',color:'var(--text-dim)',marginRight:6,direction:'ltr'}}>:{clockSec}</span>
                </div>
                <div className="clock-date">{clockDate}</div>
            </div>

            {/* Stats */}
            <div className="stats-row">
                <div className="stat-chip"><div style={{color:'var(--primary)'}}>💧</div><div><div className="stat-n">{records.length}</div><div className="stat-l">إجمالي السجلات</div></div></div>
                <div className="stat-chip"><div style={{color:'var(--teal)'}}>⏭</div><div><div className="stat-n">{status.upcoming.length}</div><div className="stat-l">القادمة</div></div></div>
            </div>

            {/* Live cards */}
            <div className="status-grid">
                <div className={`current-card ${status.current?(status.ending?'ending':'active'):'idle'}`}>
                    <svg className="wm" width="180" height="180" viewBox="0 0 24 24" fill="white"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                    <div style={{position:'relative',zIndex:1}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                            <span className="badge b-glass"><span className="pdot" style={{background:status.current?'#86efac':'#94a3b8'}}></span> الحالة الآن</span>
                            {status.ending&&<span className="badge b-danger blink"><I.Bell style={{width:12,height:12}}/> يوشك على الانتهاء</span>}
                        </div>
                        {status.current ? <>
                            <div style={{fontSize:12,opacity:.8,marginTop:18}}>الآن يسقي</div>
                            <div className="cname">{status.current.name}</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:14}}>
                                <div className="ichip">
                                    <div style={{fontSize:10,opacity:.7,marginBottom:3}}>الردة</div>
                                    <div style={{fontWeight:700,fontSize:13}}>{status.current.raddahName}</div>
                                    {status.current.athar&&<div style={{fontSize:11,opacity:.8,marginTop:4}}>{status.current.athar} أثر = {parseFloat(status.current.athar)*ATHAR_MINS} دقيقة</div>}
                                    <span className={`badge ${status.current.period==='نهار'?'b-gold':'b-indigo'}`} style={{marginTop:6,fontSize:10}}>{status.current.period}</span>
                                </div>
                                <div className="ichip">
                                    <div style={{fontSize:10,opacity:.7,marginBottom:3}}>الوقت المتبقي</div>
                                    <div className="countdown">{fmt(status.tr.h)}:{fmt(status.tr.m)}:<span className="secs">{fmt(status.tr.s)}</span></div>
                                </div>
                            </div>
                        </> : <div style={{textAlign:'center',padding:'36px 0'}}>
                            <I.Coffee style={{width:44,height:44,margin:'0 auto 10px',display:'block',opacity:.4}}/>
                            <div style={{fontSize:18,fontWeight:800}}>لا يوجد أحد يسقي الآن</div>
                            {status.nextTr&&<div style={{marginTop:6,opacity:.75,fontSize:13}}>يبدأ القادم بعد: <strong style={{direction:'ltr',display:'inline-block'}}>{fmt(status.nextTr.h)}:{fmt(status.nextTr.m)}:{fmt(status.nextTr.s)}</strong></div>}
                        </div>}
                    </div>
                </div>
                <div className="next-card">
                    <div className="next-bar"></div>
                    <div style={{paddingRight:8}}>
                        <span className="badge b-indigo" style={{marginBottom:14,display:'inline-flex'}}><I.Next style={{width:12,height:12}}/> التالي</span>
                        {status.next ? <>
                            <div style={{fontSize:22,fontWeight:800,margin:'0 0 4px'}}>{status.next.name}</div>
                            <div style={{color:'var(--text-muted)',fontSize:13,marginBottom:16}}>ردة: <strong style={{color:'var(--text)'}}>{status.next.raddahName} {status.next.athar&&`(${status.next.athar} أثر)`}</strong></div>
                            <div style={{display:'flex',flexDirection:'column',gap:6}}>
                                <div className="info-row"><I.Cal style={{width:14,height:14}}/>{status.next.day}، {fmtDate(status.next.date)}</div>
                                <div className="info-row"><I.Clock style={{width:14,height:14}}/>يبدأ <strong dir="ltr">{fmtTime12(status.next.time)}</strong></div>
                            </div>
                        </> : <div className="empty"><I.Cal/><p>لا توجد سجلات قادمة</p></div>}
                    </div>
                </div>
            </div>

            {/* Today schedule */}
            <div className="card card-glow" style={{marginTop:0}}>
                <div style={{padding:'16px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div className="sttl" style={{marginBottom:0}}><I.Cal style={{width:18,height:18}}/> جدول اليوم</div>
                        <span className="badge b-primary">{rows.length} أشخاص يسقون اليوم</span>
                    </div>

                {/* Selected pattern summary */}
                <div style={{background:'rgba(20,184,166,0.08)',border:'1px solid rgba(20,184,166,0.2)',borderRadius:9,padding:'10px 14px',fontSize:13,color:'#5eead4',marginBottom:14}}>
                    📋 النمط المحدد: <strong>{recurForm.recType==='days'?`كل ${recurForm.recValue} يوم`:`كل ${DAYS[parseInt(recurForm.recValue)]||'...'}`}</strong> — دورة مستمرة لا تتوقف — بدءاً من {recurForm.startDate?fmtDate(recurForm.startDate):'...'}
                </div>

                <button className="btn bp bfull" onClick={handleGenerate}><I.Repeat/> إنشاء الجدول تلقائياً</button>

                {/* Saved patterns */}
                {patterns.length>0&&<>
                    <div className="divider"/>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text-muted)',marginBottom:10}}>الأنماط المحفوظة:</div>
                    {patterns.map(p=><div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--surface-2)',borderRadius:8,padding:'8px 12px',marginBottom:6}}>
                        <span style={{fontSize:13}}><span className="rec-badge" style={{marginLeft:6}}>نمط</span>{p.label}</span>
                        <div style={{display:'flex',gap:6}}>
                            <button className="btn bg bic bsm" onClick={()=>setRecurForm({...ER, ...p.data, cycle: p.data.cycle || [{time:p.data.time||"", period:p.data.period||"نهار"}]})} title="استخدام"><I.Edit style={{width:13,height:13}}/></button>
                            <button className="btn bd bic bsm" onClick={()=>setPatterns(pr=>pr.filter(x=>x.id!==p.id))}><I.Trash style={{width:13,height:13}}/></button>
                        </div>
                    </div>)}
                </>}
            </div>}

            {/* Manage Records */}
            {adminTab==='manage'&&<div className="card card-glow">
                <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
                    <div className="sttl" style={{marginBottom:0}}><I.List/> جميع السجلات</div>
                    <span className="badge b-primary" style={{marginRight:'auto'}}>{records.length}</span>
                </div>
                <div className="tbl-wrap">
                    <table>
                        <thead><tr><th>الاسم</th><th>الردة</th><th>الأثر</th><th>التاريخ</th><th>الوقت</th><th>الفترة</th><th>إجراءات</th></tr></thead>
                        <tbody>
                            {!allRows.length&&<tr><td colSpan="7"><div className="empty"><p>لا سجلات</p></div></td></tr>}
                            {allRows.map(r=><tr key={r.id}>
                                <td className="pname">{r.name}</td>
                                <td>{r.raddahName}</td>
                                <td>{r.athar?<span className="badge b-surface">{r.athar}</span>:'-'}</td>
                                <td>{fmtDate(r.date)}</td>
                                <td dir="ltr" style={{fontFamily:'JetBrains Mono',fontWeight:700}}>{fmtTime12(r.time)}</td>
                                <td><span className={`badge ${r.period==='نهار'?'b-day':'b-night'}`}>{r.period}</span></td>
                                <td>
                                    <div style={{display:'flex',gap:5,justifyContent:'flex-end'}}>
                                        <button className="btn bg bic bsm" onClick={()=>{handleEdit(r);setAdminTab('manual');}}><I.Edit style={{width:13,height:13}}/></button>
                                        <button className="btn bd bic bsm" onClick={()=>setDelConfirm(r.id)}><I.Trash style={{width:13,height:13}}/></button>
                                    </div>
                                </td>
                            </tr>)}
                        </tbody>
                    </table>
                </div>
            </div>}

            {/* Delete Confirm Modal */}
            {delConfirm&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}} onClick={()=>setDelConfirm(null)}>
                <div style={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:20,padding:28,maxWidth:340,width:'100%',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                    <I.Alert style={{width:36,height:36,color:'#f87171',margin:'0 auto 12px',display:'block'}}/>
                    <h3 style={{fontSize:17,fontWeight:800,marginBottom:6}}>تأكيد الحذف</h3>
                    <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:20}}>هل أنت متأكد؟ لا يمكن التراجع عن هذا الإجراء.</p>
                    <div style={{display:'flex',gap:8}}><button className="btn bd" style={{flex:1}} onClick={()=>handleDelete(delConfirm)}>نعم، احذف</button><button className="btn bg" style={{flex:1}} onClick={()=>setDelConfirm(null)}>إلغاء</button></div>
                </div>
            </div>}
        </div>;
    };

    const navItems = [
        {id:'public',label:'الجدول',icon:<I.Layout/>},
        {id:'mine',label:'جدولي',icon:<I.User/>},
        {id:'tools',label:'الأدوات',icon:<I.Wrench/>},
        {id:'admin',label:'الإدارة',icon:<I.Shield/>}
    ];

    return <div className="app-bg">
        {/* Toast */}
        {toast&&<div className="toast" style={{background:toast.type==='err'?'rgba(220,38,38,.96)':'rgba(34,197,94,.96)'}}>{toast.msg}</div>}

        {/* Install Banner */}
        {showInstall&&<div className="install-banner">
            <p>📱 ثبّت نظام فلج على هاتفك مجاناً — يعمل بدون إنترنت!</p>
            <div style={{display:'flex',gap:8}}>
                <button onClick={installApp}>تثبيت الآن</button>
                <button onClick={()=>setShowInstall(false)} style={{background:'transparent',border:'1px solid rgba(255,255,255,0.3)',color:'white'}}>لاحقاً</button>
            </div>
        </div>}

        <header className="header">
            <div className="header-inner">
                <a className="logo" href="#" onClick={e=>{e.preventDefault();setView('public');}}>
                    <div className="logo-icon"><I.Drop style={{width:20,height:20,color:'white'}}/></div>
                    <div><div className="logo-text">فلج</div><div className="logo-sub">إدارة السقي الذكية</div></div>
                </a>
                <nav className="nav">
                    {navItems.map(n=><button key={n.id} className={`nav-btn ${view===n.id?'active':''}`} onClick={()=>{setView(n.id);setSearchQ("");}}>{n.icon}<span>{n.label}</span></button>)}
                </nav>
            </div>
        </header>

        <main className="main">
            {view==='public'&&renderPublic()}
            {view==='mine'&&renderMine()}
            {view==='tools'&&renderTools()}
            {view==='admin'&&renderAdmin()}
        </main>

        {/* WhatsApp FAB */}
        <a href={`https://wa.me/${WA_NUM.replace('+','')}`} className="wa-fab" target="_blank" rel="noopener noreferrer" title="تواصل مع وكيل الفلج">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        </a>
    </div>;
}

function playBeep() {
    try { const c=new (window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain(); o.type='sine'; o.frequency.value=800; o.connect(g); g.connect(c.destination); o.start(); g.gain.exponentialRampToValueAtTime(.00001,c.currentTime+1); o.stop(c.currentTime+1); } catch(e){}
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
